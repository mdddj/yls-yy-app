name: Build And Release macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: |
          chmod +x scripts/build_macos_app.sh
          BUILD_ARCHS="arm64 x86_64" APP_VERSION="${GITHUB_REF_NAME#v}" APP_BUILD="${GITHUB_RUN_NUMBER}" scripts/build_macos_app.sh

      - name: Verify universal app bundle
        run: |
          APP_BINARY="dist/伊莉丝Codex账户监控助手.app/Contents/MacOS/yls-yy-app"
          ARCHS="$(lipo -archs "$APP_BINARY")"
          echo "Packaged architectures: $ARCHS"
          [[ "$ARCHS" == *"arm64"* && "$ARCHS" == *"x86_64"* ]]

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle-and-dmg
          path: |
            dist/*.app
            dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
